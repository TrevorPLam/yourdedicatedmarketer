version: '3.8'

services:
  workspace:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ..:/workspace:cached
      - node_modules_volume:/workspace/node_modules
    command: sleep infinity
    environment:
      - NODE_ENV=development
      - PNPM_STORE_DIR=/root/.pnpm-store
    networks:
      - development

  postgres:
    image: postgres:15-alpine
    container_name: agency-postgres-dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    environment:
      - POSTGRES_DB=agency_dev
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev123
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    networks:
      - development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d agency_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agency-redis-dev
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - development
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  node_modules_volume:
  postgres_data:
  redis_data:

networks:
  development:
    driver: bridge
