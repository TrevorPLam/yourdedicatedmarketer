name: Build Validation

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of build to run"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - packages
          - apps
          - agency-website
          - internal-tools

# Environment variables
env:
  NODE_VERSION: "22.12.0"
  PNPM_VERSION: "10.0.0"

# Cancel in-progress runs for the same workflow and branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build all packages
  build-packages:
    name: Build Packages
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'packages' || github.event.inputs.build_type == ''
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build --filter='@agency/*'

      - name: Validate package builds
        run: |
          echo "Validating package builds..."
          
          # Check design system build
          if [ -d "packages/design-system/dist" ]; then
            echo "✅ Design system build successful"
            ls -la packages/design-system/dist/
          else
            echo "❌ Design system build failed"
            exit 1
          fi
          
          # Check UI components build
          if [ -d "packages/ui-components/dist" ]; then
            echo "✅ UI components build successful"
            ls -la packages/ui-components/dist/
          else
            echo "❌ UI components build failed"
            exit 1
          fi
          
          # Check types package build
          if [ -d "packages/types/dist" ]; then
            echo "✅ Types package build successful"
            ls -la packages/types/dist/
          else
            echo "❌ Types package build failed"
            exit 1
          fi
          
          # Check database package build
          if [ -d "packages/platform/database/dist" ]; then
            echo "✅ Database package build successful"
            ls -la packages/platform/database/dist/
          else
            echo "❌ Database package build failed"
            exit 1
          fi

      - name: Upload package build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-builds
          path: |
            packages/*/dist/
            packages/**/dist/
          retention-days: 7

  # Build agency website
  build-agency-website:
    name: Build Agency Website
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'apps' || github.event.inputs.build_type == 'agency-website' || github.event.inputs.build_type == ''
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agency website
        run: pnpm turbo build --filter='@agency/agency-website'

      - name: Validate agency website build
        run: |
          echo "Validating agency website build..."
          
          # Check build output
          if [ -d "apps/agency-website/dist" ]; then
            echo "✅ Agency website build successful"
            ls -la apps/agency-website/dist/
            
            # Check for essential files
            if [ -f "apps/agency-website/dist/index.html" ] || [ -d "apps/agency-website/dist/index" ]; then
              echo "✅ Entry point found"
            else
              echo "❌ Entry point missing"
              exit 1
            fi
            
            # Check for CSS files
            if find apps/agency-website/dist -name "*.css" | head -1 | grep -q .; then
              echo "✅ CSS files found"
            else
              echo "❌ CSS files missing"
              exit 1
            fi
            
            # Check for JS files
            if find apps/agency-website/dist -name "*.js" | head -1 | grep -q .; then
              echo "✅ JS files found"
            else
              echo "❌ JS files missing"
              exit 1
            fi
            
          else
            echo "❌ Agency website build failed"
            exit 1
          fi

      - name: Upload agency website build
        uses: actions/upload-artifact@v4
        with:
          name: agency-website-build
          path: apps/agency-website/dist/
          retention-days: 7

  # Build internal tools
  build-internal-tools:
    name: Build Internal Tools
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'apps' || github.event.inputs.build_type == 'internal-tools' || github.event.inputs.build_type == ''
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build internal tools
        run: pnpm turbo build --filter='@agency/project-manager'

      - name: Validate internal tools build
        run: |
          echo "Validating internal tools build..."
          
          # Check build output
          if [ -d "apps/internal-tools/project-manager/.next" ]; then
            echo "✅ Internal tools build successful"
            ls -la apps/internal-tools/project-manager/.next/
            
            # Check for essential Next.js files
            if [ -f "apps/internal-tools/project-manager/.next/server/app-manifest.json" ] || [ -d "apps/internal-tools/project-manager/.next/static" ]; then
              echo "✅ Next.js build structure found"
            else
              echo "❌ Next.js build structure missing"
              exit 1
            fi
            
          else
            echo "❌ Internal tools build failed"
            exit 1
          fi

      - name: Upload internal tools build
        uses: actions/upload-artifact@v4
        with:
          name: internal-tools-build
          path: apps/internal-tools/project-manager/.next/
          retention-days: 7

  # Performance and size analysis
  performance-analysis:
    name: Performance Analysis
    runs-on: ubuntu-latest
    needs: [build-packages, build-agency-website, build-internal-tools]
    if: always() && (needs.build-packages.result == 'success' || needs.build-agency-website.result == 'success' || needs.build-internal-tools.result == 'success')
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-artifacts/

      - name: Analyze bundle sizes
        run: |
          echo "## Bundle Size Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Agency website bundle size
          if [ -d "build-artifacts/agency-website-build" ]; then
            echo "### Agency Website" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            du -sh build-artifacts/agency-website-build/* | sort -hr >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Internal tools bundle size
          if [ -d "build-artifacts/internal-tools-build" ]; then
            echo "### Internal Tools" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            du -sh build-artifacts/internal-tools-build/* | sort -hr >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Package bundle sizes
          if [ -d "build-artifacts/package-builds" ]; then
            echo "### Packages" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            du -sh build-artifacts/package-builds/* | sort -hr >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for performance regressions
        run: |
          echo "Checking for performance regressions..."
          
          # Agency website size check
          if [ -d "build-artifacts/agency-website-build" ]; then
            AGENCY_SIZE=$(du -s build-artifacts/agency-website-build | cut -f1)
            echo "Agency website size: ${AGENCY_SIZE}KB"
            
            # Alert if size is larger than expected (adjust thresholds as needed)
            if [ $AGENCY_SIZE -gt 10240 ]; then # 10MB
              echo "⚠️ Agency website is larger than 10MB"
              echo "⚠️ **Agency website** is larger than expected (${AGENCY_SIZE}KB > 10MB)" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # Internal tools size check
          if [ -d "build-artifacts/internal-tools-build" ]; then
            INTERNAL_SIZE=$(du -s build-artifacts/internal-tools-build | cut -f1)
            echo "Internal tools size: ${INTERNAL_SIZE}KB"
            
            # Alert if size is larger than expected
            if [ $INTERNAL_SIZE -gt 20480 ]; then # 20MB
              echo "⚠️ Internal tools are larger than 20MB"
              echo "⚠️ **Internal tools** are larger than expected (${INTERNAL_SIZE}KB > 20MB)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # Build validation summary
  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-packages, build-agency-website, build-internal-tools, performance-analysis]
    if: always()
    
    steps:
      - name: Build Validation Summary
        run: |
          echo "## Build Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Build Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Packages | ${{ needs.build-packages.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agency Website | ${{ needs.build-agency-website.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal Tools | ${{ needs.build-internal-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Analysis | ${{ needs.performance-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count failed builds
          FAILED_BUILDS=0
          if [[ "${{ needs.build-packages.result }}" == "failure" ]]; then
            ((FAILED_BUILDS++))
          fi
          if [[ "${{ needs.build-agency-website.result }}" == "failure" ]]; then
            ((FAILED_BUILDS++))
          fi
          if [[ "${{ needs.build-internal-tools.result }}" == "failure" ]]; then
            ((FAILED_BUILDS++))
          fi
          
          if [[ $FAILED_BUILDS -gt 0 ]]; then
            echo "❌ **Build Validation Failed** - $FAILED_BUILDS build(s) failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the build logs and fix any build errors before merging." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **All Builds Passed** - Build validation successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
            echo "- Review performance analysis" >> $GITHUB_STEP_SUMMARY
            echo "- Check bundle sizes for optimization opportunities" >> $GITHUB_STEP_SUMMARY
            echo "- Validate that all builds meet performance requirements" >> $GITHUB_STEP_SUMMARY
          fi
