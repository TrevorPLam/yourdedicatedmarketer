name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      target:
        description: "Deployment target"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - agency-website
          - internal-tools
          - packages

# Environment variables
env:
  NODE_VERSION: "22.12.0"
  PNPM_VERSION: "10.0.0"

# Environment-specific permissions
permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  # Pre-deployment checks
  pre-deploy-checks:
    name: Pre-deployment Checks
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.checks.outputs.can-deploy }}
      
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run pre-deployment checks
        id: checks
        run: |
          echo "Running pre-deployment checks..."
          
          # Check if we're on main branch for production deployments
          if [[ "${{ github.event.inputs.environment }}" == "production" && "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "❌ Production deployments only allowed from main branch"
            echo "can-deploy=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check for required environment variables (in production)
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "Checking required environment variables..."
            if [[ -z "${{ secrets.VERCEL_TOKEN }}" ]]; then
              echo "❌ Missing required environment variable: VERCEL_TOKEN"
              echo "can-deploy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
            if [[ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]]; then
              echo "❌ Missing required environment variable: CLOUDFLARE_API_TOKEN"
              echo "can-deploy=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          
          echo "✅ All pre-deployment checks passed"
          echo "can-deploy=true" >> $GITHUB_OUTPUT

  # Build for deployment
  build-for-deploy:
    name: Build for Deployment
    runs-on: ubuntu-latest
    needs: pre-deploy-checks
    if: needs.pre-deploy-checks.outputs.can-deploy == 'true'
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Cache turbo build outputs
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages and applications
        run: pnpm turbo build --filter='@agency/*' --filter='@agency/agency-website' --filter='@agency/project-manager'
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-builds
          path: |
            packages/*/dist/
            packages/**/dist/
            apps/agency-website/dist/
            apps/internal-tools/project-manager/.next/
          retention-days: 1

  # Deploy agency website
  deploy-agency-website:
    name: Deploy Agency Website
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, build-for-deploy]
    if: needs.pre-deploy-checks.outputs.can-deploy == 'true' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'agency-website')
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-builds
          path: build-artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Pages
        if: github.event.inputs.environment == 'production' || github.event.inputs.environment == 'staging'
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: agency-website
          directory: build-artifacts/apps/agency-website/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Deploy preview (for workflow runs)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
        run: |
          echo "Deploying preview for workflow run #${{ github.run_id }}"
          # Add preview deployment logic here

  # Deploy internal tools
  deploy-internal-tools:
    name: Deploy Internal Tools
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, build-for-deploy]
    if: needs.pre-deploy-checks.outputs.can-deploy == 'true' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'internal-tools')
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-builds
          path: build-artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel
        if: github.event.inputs.environment == 'production' || github.event.inputs.environment == 'staging'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/internal-tools/project-manager
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Deploy preview
        if: github.event.inputs.environment == 'staging'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/internal-tools/project-manager
          alias-domains: staging-agency-tools.vercel.app

  # Deploy packages to npm
  deploy-packages:
    name: Deploy Packages
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, build-for-deploy]
    if: needs.pre-deploy-checks.outputs.can-deploy == 'true' && (github.event.inputs.target == 'all' || github.event.inputs.target == 'packages')
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-builds
          path: build-artifacts/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build artifacts
        run: |
          # Copy build artifacts back to their original locations
          cp -r build-artifacts/packages/* packages/
          cp -r build-artifacts/packages/**/* packages/**/

      - name: Check for changes
        id: changes
        run: |
          # Check if there are any package changes to publish
          if [[ "$(git diff --name-only HEAD~1 HEAD | grep -E 'packages/.*package\.json' | wc -l)" -gt 0 ]]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish packages
        if: steps.changes.outputs.has-changes == 'true'
        run: |
          echo "Publishing packages..."
          pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.changes.outputs.has-changes == 'true' && github.event.inputs.environment == 'production'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          draft: false
          prerelease: false

  # Post-deployment verification
  post-deploy-verification:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: [deploy-agency-website, deploy-internal-tools, deploy-packages]
    if: always() && (needs.deploy-agency-website.result == 'success' || needs.deploy-internal-tools.result == 'success' || needs.deploy-packages.result == 'success')
    
    steps:
      - name: Verify agency website deployment
        if: needs.deploy-agency-website.result == 'success'
        run: |
          echo "Verifying agency website deployment..."
          
          # Add health checks here
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "Checking https://youragency.com..."
            # curl -f https://youragency.com || exit 1
          else
            echo "Checking staging deployment..."
            # curl -f https://staging-youragency.pages.dev || exit 1
          fi
          
          echo "✅ Agency website deployment verified"

      - name: Verify internal tools deployment
        if: needs.deploy-internal-tools.result == 'success'
        run: |
          echo "Verifying internal tools deployment..."
          
          # Add health checks here
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "Checking https://tools.youragency.com..."
            # curl -f https://tools.youragency.com || exit 1
          else
            echo "Checking staging deployment..."
            # curl -f https://staging-agency-tools.vercel.app || exit 1
          fi
          
          echo "✅ Internal tools deployment verified"

      - name: Verify package deployment
        if: needs.deploy-packages.result == 'success'
        run: |
          echo "Verifying package deployment..."
          
          # Check if packages are available on npm
          # npm view @agency/design-system
          # npm view @agency/ui-components
          
          echo "✅ Package deployment verified"

  # Deployment summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [pre-deploy-checks, deploy-agency-website, deploy-internal-tools, deploy-packages, post-deploy-verification]
    if: always()
    
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** ${{ github.event.inputs.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-deployment Checks | ${{ needs.pre-deploy-checks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agency Website | ${{ needs.deploy-agency-website.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Internal Tools | ${{ needs.deploy-internal-tools.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Packages | ${{ needs.deploy-packages.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Post-deployment Verification | ${{ needs.post-deploy-verification.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count failed deployments
          FAILED_DEPLOYMENTS=0
          if [[ "${{ needs.deploy-agency-website.result }}" == "failure" ]]; then
            ((FAILED_DEPLOYMENTS++))
          fi
          if [[ "${{ needs.deploy-internal-tools.result }}" == "failure" ]]; then
            ((FAILED_DEPLOYMENTS++))
          fi
          if [[ "${{ needs.deploy-packages.result }}" == "failure" ]]; then
            ((FAILED_DEPLOYMENTS++))
          fi
          
          if [[ $FAILED_DEPLOYMENTS -gt 0 ]]; then
            echo "❌ **Deployment Failed** - $FAILED_DEPLOYMENTS deployment(s) failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please review the deployment logs and fix any issues." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Deployment Successful** - All deployments completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Deployment URLs" >> $GITHUB_STEP_SUMMARY
            if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
              echo "- Agency Website: https://youragency.com" >> $GITHUB_STEP_SUMMARY
              echo "- Internal Tools: https://tools.youragency.com" >> $GITHUB_STEP_SUMMARY
            else
              echo "- Agency Website: https://staging-youragency.pages.dev" >> $GITHUB_STEP_SUMMARY
              echo "- Internal Tools: https://staging-agency-tools.vercel.app" >> $GITHUB_STEP_SUMMARY
            fi
          fi
