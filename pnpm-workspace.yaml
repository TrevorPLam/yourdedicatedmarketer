# Marketing Agency Monorepo Workspace Configuration
# ===============================================
# pnpm workspace configuration for enterprise-grade monorepo
# Uses dependency catalog for version consistency across packages

packages:
  - 'apps/*'
  - 'apps/internal-tools/*'
  - 'apps/client-sites/*'
  - 'packages/*'
  - 'packages/platform/*'
  - 'packages/shared/*'
  - 'tools/*'
  - 'docs/*'

# Dependency Catalog for Version Consistency
# =========================================
# Centralized dependency management with exact versions
# All workspace packages should reference these versions
